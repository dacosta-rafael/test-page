<!DOCTYPE html>
<html>
<body style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0; font-family:sans-serif;">
  <button id="btn" onclick="go()" style="font-size:22px; padding:20px 50px; border-radius:12px; cursor:pointer;">
    🔵 Detect Beacon
  </button>
  <p id="msg" style="margin-top:20px; font-size:16px; color:#555; text-align:center; white-space:pre;"></p>
  <script>
    async function go() {
      const btn = document.getElementById("btn");
      const msg = document.getElementById("msg");
      btn.disabled = true;
      msg.textContent = "Looking for beacon...";
      try {
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ name: "Rafael da Costa" }]
        });

        msg.textContent = "Watching for: " + device.name;

        device.addEventListener("advertisementreceived", e => {
          msg.textContent = "✅ Beacon detected!\nName: " + e.name + "\nRSSI: " + e.rssi + " dBm";
        });

        await device.watchAdvertisements();

      } catch(e) {
        msg.textContent = "Error: " + e.message;
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
