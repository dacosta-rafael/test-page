<!DOCTYPE html>
<html>
<body>
  <button onclick="scan()">Read beacon data</button>
  <script>
    async function scan() {
      const device = await navigator.bluetooth.requestDevice({
        filters: [{ name: "BCPro_208061" }],
        optionalServices: ["battery_service", "device_information"]
      });

      const server = await device.gatt.connect();
      let out = "Name: " + device.name + "\nID: " + device.id + "\n\n";

      try {
        const svc = await server.getPrimaryService("battery_service");
        const chr = await svc.getCharacteristic("battery_level");
        const val = await chr.readValue();
        out += "Battery: " + val.getUint8(0) + "%\n";
      } catch(e) { out += "Battery: n/a\n"; }

      try {
        const svc = await server.getPrimaryService("device_information");
        const chars = await svc.getCharacteristics();
        for (const c of chars) {
          try {
            const v = await c.readValue();
            out += new TextDecoder().decode(v) + "\n";
          } catch(e) {}
        }
      } catch(e) { out += "Device info: n/a\n"; }

      alert(out);
    }
  </script>
</body>
</html>
