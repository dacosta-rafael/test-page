<!DOCTYPE html>
<html>
<body style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0; font-family:sans-serif;">
  <button id="btn" onclick="go()" style="font-size:22px; padding:20px 50px; border-radius:12px; cursor:pointer;">
    🔵 Read Beacon
  </button>
  <p id="msg" style="margin-top:20px; font-size:16px; color:#555; text-align:center; white-space:pre;"></p>

  <script>
    async function connect(device, tries = 5) {
      for (let i = 0; i < tries; i++) {
        try { return await device.gatt.connect(); }
        catch(e) { if (i === tries-1) throw e; await new Promise(r => setTimeout(r, 500)); }
      }
    }

    async function go() {
      const btn = document.getElementById("btn");
      const msg = document.getElementById("msg");
      btn.disabled = true;
      msg.textContent = "Connecting...";
      try {
const device = await navigator.bluetooth.requestDevice({
  acceptAllDevices: true,
  optionalServices: [0x180A, 0x1801, 0x1800]
});
        const server = await connect(device);
        let out = "Name: " + device.name + "\n\n";

        for (const uuid of ["0000180a-0000-1000-8000-00805f9b34fb",
                             "00001800-0000-1000-8000-00805f9b34fb"]) {
          try {
            const svc = await server.getPrimaryService(uuid);
            const chars = await svc.getCharacteristics();
            for (const c of chars) {
              try {
                const v = await c.readValue();
                const text = new TextDecoder().decode(v);
                out += c.uuid.substring(4,8).toUpperCase() + ": " + text + "\n";
              } catch(e) {}
            }
          } catch(e) {}
        }
        msg.textContent = out;
      } catch(e) {
        msg.textContent = "Error: " + e.message;
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
