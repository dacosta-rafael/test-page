<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <title>Beacon Scanner</title>
</head>
<body style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0; font-family:sans-serif;">
  <button id="btn" onclick="go()" style="font-size:22px; padding:20px 50px; border-radius:12px; cursor:pointer;">
    🔵 Scan Beacon
  </button>
  <p id="msg" style="margin-top:20px; font-size:16px; color:#555; text-align:center; white-space:pre;"></p>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/test-page/sw.js');
    }
    async function go() {
      const btn = document.getElementById("btn");
      const msg = document.getElementById("msg");
      btn.disabled = true;
      msg.textContent = "Looking...";
      try {
        const device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true
        });
        msg.textContent = "✅ Found!\nName: " + device.name + "\nID: " + device.id;
      } catch(e) {
        msg.textContent = "Error: " + e.message;
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
