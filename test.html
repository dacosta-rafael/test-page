<!DOCTYPE html>
<html>
<body>
  <button onclick="scan()">Find beacon</button>
  <script>
    async function scan() {
      const device = await navigator.bluetooth.requestDevice({
        acceptAllDevices: true
      });
      alert("Name: " + device.name + "\nID: " + device.id);
    }
  </script>
</body>
</html>
