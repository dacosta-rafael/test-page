<!DOCTYPE html>
<html>
<body>
  <button id="btn" onclick="manual()" style="display:none">Pair beacon</button>
  <p id="status">Checking for beacon...</p>
  <script>
    const status = document.getElementById("status");
    const btn = document.getElementById("btn");

    async function connect(device) {
      status.textContent = "Connecting...";
      const server = await device.gatt.connect();
      const svc = await server.getPrimaryService("battery_service");
      const chr = await svc.getCharacteristic("battery_level");
      const val = await chr.readValue();
      alert("Battery: " + val.getUint8(0) + "%");
      status.textContent = "Done!";
    }

    // Runs automatically on load
    async function autoConnect() {
      try {
        const devices = await navigator.bluetooth.getDevices();
        const device = devices.find(d => d.name === "BCPro_208061");
        if (device) {
          await connect(device);
        } else {
          status.textContent = "Never paired - click button to pair";
          btn.style.display = "block";
        }
      } catch(e) {
        status.textContent = "Error: " + e.message;
      }
    }

    async function manual() {
      const device = await navigator.bluetooth.requestDevice({
        filters: [{ name: "BCPro_208061" }],
        optionalServices: ["battery_service"]
      });
      await connect(device);
    }

    autoConnect();
  </script>
</body>
</html>
