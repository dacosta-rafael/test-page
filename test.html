<!DOCTYPE html>
<html>
<body style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0; font-family:sans-serif;">
  <button id="btn" onclick="go()" style="font-size:22px; padding:20px 50px; border-radius:12px; cursor:pointer;">
    🔵 Scan Services
  </button>
  <p id="msg" style="margin-top:20px; font-size:16px; color:#555; text-align:center; white-space:pre;"></p>

  <script>
    async function connect(device, tries = 5) {
      for (let i = 0; i < tries; i++) {
        try {
          return await device.gatt.connect();
        } catch(e) {
          if (i === tries - 1) throw e;
          await new Promise(r => setTimeout(r, 500));
        }
      }
    }

    async function go() {
      const btn = document.getElementById("btn");
      const msg = document.getElementById("msg");
      btn.disabled = true;
      msg.textContent = "Connecting...";
      try {
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ name: "BCPro_208061" }],
          optionalServices: [0x180F, 0x180A, 0x1800, 0x1801, 0xFF00, 0xFFF0]
        });
        const server = await connect(device);
        msg.textContent = "Connected! Reading...";
        const services = await server.getPrimaryServices();
        let out = "Services found:\n";
        for (const s of services) {
          out += "• " + s.uuid + "\n";
        }
        msg.textContent = out;
      } catch(e) {
        msg.textContent = "Error: " + e.message;
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
